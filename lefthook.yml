pre-commit:
  parallel: true
  commands:
    install:
      run: bun install --frozen-lockfile
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: bun run lint --fix
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,json,md,astro,css}"
      run: bun run format
      stage_fixed: true
    typecheck:
      run: bun run typecheck

pre-push:
  commands:
    build:
      run: bun run build
      priority: 1
    exports:
      run: bun run check:exports
      priority: 2
    test:
      run: bun test
    skill-verify:
      run: npx skills-ref validate skills/dice-rolling/SKILL.md
    audit:
      run: bun audit --level=high
