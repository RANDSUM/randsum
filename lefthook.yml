pre-commit:
  parallel: true
  output:
    - summary
    - failure
  commands:
    install:
      run: bun install --frozen-lockfile
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: bun run lint --fix
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,json,md,astro,css}"
      run: bunx prettier --write --ignore-path .prettierignore --config .prettierrc {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck

pre-push:
  output:
    - summary
    - failure
  commands:
    build:
      run: bun run build > /dev/null 2>&1
      priority: 1
    codegen-check:
      run: bun run --filter @randsum/games gen:check > /dev/null 2>&1
      priority: 2
    test:
      run: bun test 2>&1 | tail -5
      priority: 2
    audit:
      run: bun audit --level=high > /dev/null 2>&1
      priority: 2
