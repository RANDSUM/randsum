pre-commit:
  # `install` runs first (priority: 1); the rest run in parallel afterward
  # (priority: 2). Lefthook respects priority ordering and only parallelises
  # within a priority band — without this, install raced lint/typecheck on
  # fresh checkouts and flaked workspace resolution.
  parallel: true
  output:
    - summary
    - failure
  commands:
    install:
      run: bun install --frozen-lockfile
      priority: 1
    # Biome replaces the former ESLint (--fix) + Prettier steps in a single pass:
    # `check --write` runs the linter (applying safe fixes) and the formatter.
    # Unfixable lint errors still exit non-zero and block the commit, matching the
    # old `eslint --fix` gate.
    biome:
      glob: "*.{ts,tsx,js,mjs,cjs,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      priority: 2
    # Biome does not format .astro templates, so prettier-plugin-astro (scoped to
    # apps/site + apps/rdn) still formats staged .astro files.
    format-astro:
      glob: "*.astro"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
      priority: 2
    typecheck:
      run: bun run typecheck
      priority: 2
    codegen-check:
      glob: "packages/games/*.randsum.json"
      run: bun run --filter @randsum/games gen:check
      priority: 2

pre-push:
  output:
    - summary
    - failure
  commands:
    build:
      run: bun run build > /dev/null 2>&1
      priority: 1
    codegen-check:
      run: bun run --filter @randsum/games gen:check > /dev/null 2>&1
      priority: 2
    conformance-check:
      run: bun run --filter @randsum/rdn conformance:check > /dev/null 2>&1
      priority: 2
    test:
      run: bun run test 2>&1 | tail -5
      priority: 2
    audit:
      # Dependency advisory gate. The esbuild >=0.28.1 override in the root
      # package.json resolves GHSA-gv7w-rqvm-qjhr, so no --ignore is needed.
      # Also runs in CI (ci.yml `audit` job) so it cannot be bypassed with --no-verify.
      run: bun audit --audit-level=high > /dev/null 2>&1
      priority: 2
    sca:
      # Local mirror of the CI `sca` job (OSV-Scanner against bun.lock, honouring
      # osv-scanner.toml ignores). Uses a local osv-scanner binary or the CI Docker
      # image if available; soft-skips with an install hint otherwise. Surfaces SCA
      # findings before push — CI's `sca` job remains the source of truth.
      run: bash scripts/sca-scan.sh
      priority: 2
    knip:
      run: bun run knip > /dev/null 2>&1
      priority: 2
    arch-check:
      # Cycle + boundary invariants (audit X7b / architecture R2+R3): no circular
      # deps, no game-to-game import, no @randsum/*/src or /dist reach-in. Also runs
      # in CI feeding the CI Gate so it cannot be bypassed with --no-verify.
      run: bun run arch:check > /dev/null 2>&1
      priority: 2
