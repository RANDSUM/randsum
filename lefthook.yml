pre-commit:
  # `install` runs first (priority: 1); the rest run in parallel afterward
  # (priority: 2). Lefthook respects priority ordering and only parallelises
  # within a priority band — without this, install raced lint/typecheck on
  # fresh checkouts and flaked workspace resolution.
  parallel: true
  output:
    - summary
    - failure
  commands:
    install:
      run: bun install --frozen-lockfile
      priority: 1
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: bun run lint --fix
      stage_fixed: true
      priority: 2
    format:
      glob: "*.{ts,tsx,js,json,md,astro,css}"
      run: bunx prettier --write --ignore-path .prettierignore --config .prettierrc {staged_files}
      stage_fixed: true
      priority: 2
    typecheck:
      run: bun run typecheck
      priority: 2
    codegen-check:
      glob: "packages/games/*.randsum.json"
      run: bun run --filter @randsum/games gen:check
      priority: 2
    gitleaks:
      # Committed-secret scan (audit N3). The wrapper runs the gitleaks binary or
      # docker image if present and fails the commit on a finding; if neither is
      # installed it prints a loud install hint and exits 0 (CI is the hard gate
      # that cannot be bypassed with --no-verify). Not gated on a glob: it must
      # see every staged change, so it cannot be silently skipped by file type.
      run: bash scripts/gitleaks-precommit.sh
      priority: 2

pre-push:
  output:
    - summary
    - failure
  commands:
    build:
      run: bun run build > /dev/null 2>&1
      priority: 1
    codegen-check:
      run: bun run --filter @randsum/games gen:check > /dev/null 2>&1
      priority: 2
    conformance-check:
      run: bun run --filter @randsum/rdn conformance:check > /dev/null 2>&1
      priority: 2
    test:
      run: bun run test 2>&1 | tail -5
      priority: 2
    audit:
      # GHSA-gv7w-rqvm-qjhr: esbuild Deno-install binary-integrity issue. Not applicable
      # to this bun/node monorepo (no Deno install path), dev/build-time only, and unfixable
      # without a dependency override (astro/vite/size-limit pin esbuild <0.28.1 upstream).
      run: bun audit --audit-level=high --ignore=GHSA-gv7w-rqvm-qjhr > /dev/null 2>&1
      priority: 2
    knip:
      run: bun run knip > /dev/null 2>&1
      priority: 2
    arch-check:
      # Cycle + boundary invariants (audit X7b / architecture R2+R3): no circular
      # deps, no game-to-game import, no @randsum/*/src or /dist reach-in. Also runs
      # in CI feeding the CI Gate so it cannot be bypassed with --no-verify.
      run: bun run arch:check > /dev/null 2>&1
      priority: 2
