name: "CI for Packages"
runs:
  using: "composite" #
  steps:
    - name: Use Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install deps
      run: bun install

    - name: TypeCheck
      run: bun ts:check

    - name: Lint
      run: bun lint && bun format

    - name: Test
      run:
        CI=true bun test

    - name: Build
      run: bun run build
