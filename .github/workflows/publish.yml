name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-all:
    name: Pre-publish checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> $GITHUB_OUTPUT
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Build all packages
        run: bun run build
      - name: Run all package checks
        run: bun run check
      - name: Check bundle sizes
        run: bun run --filter '@randsum/roller' size && bun run --filter '@randsum/games' size
      - name: Security audit
        run: bun audit --audit-level high
      - name: Dry-run publish preflight
        run: bun run publish -- --dry-run

  publish:
    name: Publish to npm
    needs: check-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> $GITHUB_OUTPUT
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Build all packages
        run: bun run build

      # ── Pre-publish version checks (must run before publish) ───────────

      - name: Check roller version
        id: roller
        run: |
          PACKAGE_VERSION=$(jq -r '.version' packages/roller/package.json)
          NPM_VERSION=$(npm view @randsum/roller version 2>/dev/null || echo "0.0.0")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "was_published=false" >> $GITHUB_OUTPUT
          else
            echo "was_published=true" >> $GITHUB_OUTPUT
          fi

      - name: Check games version
        id: games
        run: |
          PACKAGE_VERSION=$(jq -r '.version' packages/games/package.json)
          NPM_VERSION=$(npm view @randsum/games version 2>/dev/null || echo "0.0.0")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "was_published=false" >> $GITHUB_OUTPUT
          else
            echo "was_published=true" >> $GITHUB_OUTPUT
          fi


      - name: Check cli version
        id: cli
        run: |
          PACKAGE_VERSION=$(jq -r '.version' apps/cli/package.json)
          NPM_VERSION=$(npm view @randsum/cli version 2>/dev/null || echo "0.0.0")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "was_published=false" >> $GITHUB_OUTPUT
          else
            echo "was_published=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish packages
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/publish.ts

      # ── GitHub Releases ────────────────────────────────────────────────

      - name: Release @randsum/roller
        if: steps.roller.outputs.was_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "roller-${{ steps.roller.outputs.version }}" \
            --title "roller v${{ steps.roller.outputs.version }}" \
            --generate-notes

      - name: Release @randsum/games
        if: steps.games.outputs.was_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "games-${{ steps.games.outputs.version }}" \
            --title "games v${{ steps.games.outputs.version }}" \
            --generate-notes

      - name: Release @randsum/cli
        if: steps.cli.outputs.was_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "cli-${{ steps.cli.outputs.version }}" \
            --title "cli v${{ steps.cli.outputs.version }}" \
            --generate-notes
