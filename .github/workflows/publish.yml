name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Build all packages
        run: bun run build
      - name: Run all checks
        run: bun run check
      - name: Check bundle sizes
        run: bun run --filter '@randsum/roller' size && bun run --filter '@randsum/games' size

      - name: Publish roller
        continue-on-error: true
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/roller && bun publish --access=public

      - name: Publish games
        continue-on-error: true
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/games && bun publish --access=public

      - name: Publish cli
        continue-on-error: true
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd apps/cli && bun publish --access=public
