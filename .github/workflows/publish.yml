name: Release

# SECURITY — workflow_run safe-usage invariant (audit L7 / security F3).
# `workflow_run` runs in the PRIVILEGED base-repo context with access to
# GITHUB_TOKEN + the OIDC id-token (used for npm Trusted Publishing) and
# contents:write + id-token:write. To avoid a
# "pwn-request" exposure this job MUST:
#   - only ever check out trusted DEFAULT-BRANCH code (the bare `actions/checkout`
#     below resolves to the default branch in workflow_run context — never pass a
#     PR ref/sha to checkout here), and
#   - NEVER download or execute artifacts uploaded by the triggering CI run
#     (fork PRs can populate those). No `actions/download-artifact` belongs here.
# The trigger is already gated on `branches: [main]` + conclusion == 'success';
# keep it that way. Any change that consumes PR-controlled input converts this
# into a credential-leak vector — re-review against this invariant first.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install latest npm
        run: npm install -g npm@latest
      - name: Build all packages
        run: bun run build
      - name: Check bundle sizes
        run: bun run --filter '@randsum/roller' size && bun run --filter '@randsum/games' size

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        with:
          version: bun changeset version
          publish: bun run publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # No NPM_TOKEN/NODE_AUTH_TOKEN: npm authenticates via OIDC Trusted
          # Publishing (id-token: write above). A token here would override OIDC.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
