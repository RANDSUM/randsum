name: CI
on: [push]
defaults:
  run:
    working-directory: packages/@randsum/core

jobs:
  build:
    name: Test and Build - Core

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Test
        run:
          CI=true bun test

      - name: Build
        run: bun run build
