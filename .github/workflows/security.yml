name: Security Audit
permissions:
  contents: read
# Schedule-only: pushes to main are already covered by the ci.yml `audit` job.
# This weekly run catches newly-published advisories against unchanged code.
on:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/bun-setup

      - name: Security audit
        run: bun audit --audit-level=high
