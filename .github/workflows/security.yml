name: Security Audit
permissions:
  contents: read
# Schedule-only: pushes to main are already covered by the ci.yml `audit` job.
# This weekly run catches newly-published advisories against unchanged code.
on:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup

      - name: Security audit
        run: bun audit --audit-level=high
