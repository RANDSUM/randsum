name: Security Audit
permissions:
  contents: read
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/bun-setup

      - name: Security audit
        run: bun audit --audit-level high
