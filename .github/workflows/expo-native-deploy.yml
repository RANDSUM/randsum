name: Deploy Expo Native (iOS + Android)

# Manual-trigger only. Native builds are not submitted to App Store / Play Store
# automatically, so running them on every push to main burns EAS build minutes
# for binaries no one installs. Trigger via the Actions tab when a release is
# actually ready to ship to stores.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        default: both
        options:
          - both
          - android
          - ios

concurrency:
  group: expo-native-deploy
  cancel-in-progress: true

jobs:
  build-android:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pin Bun to .bun-version (1.3.14) via the shared composite — was
      # `bun-version: latest` (audit X4 / infrastructure F2). The composite also
      # restores the bun cache and runs `bun install --frozen-lockfile`.
      - uses: ./.github/actions/bun-setup

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e  # v8
        with:
          # Pin EAS CLI to a known-good major/minor — was `latest` (audit X4 / F2).
          eas-version: ^20.1.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: cd apps/expo && npx eas-cli build --platform android --profile production --non-interactive

  build-ios:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pin Bun to .bun-version (1.3.14) via the shared composite — was
      # `bun-version: latest` (audit X4 / infrastructure F2). The composite also
      # restores the bun cache and runs `bun install --frozen-lockfile`.
      - uses: ./.github/actions/bun-setup

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e  # v8
        with:
          # Pin EAS CLI to a known-good major/minor — was `latest` (audit X4 / F2).
          eas-version: ^20.1.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: cd apps/expo && npx eas-cli build --platform ios --profile production --non-interactive
