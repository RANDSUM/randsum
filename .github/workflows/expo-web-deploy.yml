name: Deploy Expo Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/expo/**'
      - 'packages/dice-ui/**'
      - 'packages/roller/**'

concurrency:
  group: expo-web-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pin Bun to .bun-version (1.3.14) via the shared composite — was
      # `bun-version: latest` (audit X4 / infrastructure F2). The composite also
      # restores the bun cache and runs `bun install --frozen-lockfile`.
      - uses: ./.github/actions/bun-setup

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e  # v8
        with:
          # Pin EAS CLI to a known-good major/minor — was `latest` (audit X4 / F2).
          eas-version: ^20.1.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Export web build
        run: cd apps/expo && npx expo export --platform web

      - name: Deploy to EAS Hosting
        run: cd apps/expo && npx eas-cli deploy --prod --non-interactive
