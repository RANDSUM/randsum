name: Deploy Expo Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/expo/**'
      - 'packages/dice-ui/**'
      - 'packages/roller/**'

concurrency:
  group: expo-web-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e  # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Export web build
        run: cd apps/expo && npx expo export --platform web

      - name: Deploy to EAS Hosting
        run: cd apps/expo && npx eas-cli deploy --prod --non-interactive
