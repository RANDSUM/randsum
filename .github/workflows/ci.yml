name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      roller: ${{ steps.filter.outputs.roller }}
      games: ${{ steps.filter.outputs.games }}
      cli: ${{ steps.filter.outputs.cli }}
      mcp: ${{ steps.filter.outputs.mcp }}
      site: ${{ steps.filter.outputs.site }}
      rdn: ${{ steps.filter.outputs.rdn }}
      dice-ui: ${{ steps.filter.outputs.dice-ui }}
      skill: ${{ steps.filter.outputs.skill }}
      discord-bot: ${{ steps.filter.outputs.discord-bot }}
      changesets: ${{ steps.filter.outputs.changesets }}
      # Dynamic matrix for the consolidated `package` job below: one include leg
      # per CHANGED package, carrying its per-package config (prereq builds, node
      # version, coverage flag, size gate). Job-level `if` cannot see `matrix`, so
      # filtering the legs here is how unchanged packages skip.
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            roller:
              - 'packages/roller/**'
              - '.github/workflows/ci.yml'
            games:
              - 'packages/roller/**'
              - 'packages/games/**'
              - '.github/workflows/ci.yml'
            cli:
              - 'packages/roller/**'
              - 'apps/cli/**'
              - '.github/workflows/ci.yml'
            mcp:
              - 'packages/roller/**'
              - 'packages/games/**'
              - 'packages/mcp/**'
              - '.github/workflows/ci.yml'
            site:
              - 'packages/**'
              - 'apps/site/**'
              - '.github/workflows/ci.yml'
            rdn:
              - 'apps/rdn/**'
              - 'packages/roller/**'
              - '.github/workflows/ci.yml'
            dice-ui:
              - 'packages/roller/**'
              - 'packages/dice-ui/**'
              - '.github/workflows/ci.yml'
            skill:
              - 'skills/**'
              - '.claude-plugin/**'
              - '.github/workflows/ci.yml'
            discord-bot:
              - 'apps/discord-bot/**'
              - 'packages/roller/**'
              - 'packages/games/**'
              - '.github/workflows/ci.yml'
            changesets:
              - '.changeset/**'
              - '!.changeset/README.md'
              - '!.changeset/config.json'
              # Also re-run the publish dry-run when the packaging surface changes,
              # so publint/attw catch manifest regressions without a changeset.
              - 'scripts/publish.ts'
              - 'packages/*/package.json'
      - name: Build package matrix
        id: set-matrix
        # Emit one include leg per CHANGED package. The full per-package config
        # lives here; jq keeps only the legs whose paths-filter output is 'true'.
        # An empty include => the `package` job produces zero legs and is skipped.
        run: |
          all='[
            {"pkg":"roller","coverage":"roller","size":true},
            {"pkg":"games","build":"@randsum/roller","coverage":"games","size":true},
            {"pkg":"cli","build":"@randsum/roller"},
            {"pkg":"mcp","build":"@randsum/roller @randsum/games"},
            {"pkg":"discord-bot","build":"@randsum/roller @randsum/games"},
            {"pkg":"site","build":"@randsum/roller @randsum/games","node":"22"},
            {"pkg":"rdn","build":"@randsum/roller","node":"22"},
            {"pkg":"dice-ui","build":"@randsum/roller","coverage":"dice-ui"}
          ]'
          changed='${{ toJSON(steps.filter.outputs) }}'
          include=$(jq -cn --argjson all "$all" --argjson changed "$changed" \
            '$all | map(select($changed[.pkg] == "true"))')
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  # The eight per-package jobs (roller, games, cli, mcp, discord-bot, site, rdn,
  # dice-ui) were near-identical, differing only in filter name, prerequisite
  # builds, node version, and coverage flags. They are folded into one matrix,
  # populated dynamically by the `changes` job so only changed packages get a
  # leg. The `include` entries carry the per-package differences.
  package:
    name: ${{ matrix.pkg }}
    needs: changes
    # Skip entirely when no package changed (empty include => no legs anyway,
    # but this keeps the job from appearing at all).
    if: fromJSON(needs.changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      # Run every package leg even if a sibling fails, so the CI Gate sees each
      # package's real result instead of a fail-fast cancellation.
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
        with:
          # site/rdn pin node 22 to match their netlify.toml NODE_VERSION so CI
          # builds them on the runtime Netlify deploys on; other legs pass '',
          # which bun-setup treats as "skip node setup".
          node-version: ${{ matrix.node || '' }}
      - name: Build dependencies
        if: matrix.build
        # Build prerequisites one at a time in listed (dependency) order. bun's
        # --filter runs in parallel without topological ordering, and games'
        # build needs roller's dist to already exist, so a combined multi-filter
        # build would race. matrix.build is passed via env (not interpolated
        # into the script) to avoid template-injection.
        env:
          BUILD: ${{ matrix.build }}
        run: |
          read -ra pkgs <<< "$BUILD"
          for pkg in "${pkgs[@]}"; do
            bun run --filter "$pkg" build
          done
      - name: Verify generated files are up to date
        if: matrix.pkg == 'games'
        run: bun run --filter '@randsum/games' gen:check
      - name: Check
        env:
          PKG: ${{ matrix.pkg }}
        run: bun run --filter "@randsum/$PKG" check
      - name: Generate coverage
        if: matrix.coverage
        env:
          PKG: ${{ matrix.pkg }}
        run: bun run --filter "@randsum/$PKG" test:coverage
      - name: Upload coverage to Codecov
        if: matrix.coverage && hashFiles(format('packages/{0}/coverage/lcov.info', matrix.pkg)) != ''
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5
        with:
          files: ./packages/${{ matrix.pkg }}/coverage/lcov.info
          flags: ${{ matrix.coverage }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check bundle size
        if: matrix.size
        env:
          PKG: ${{ matrix.pkg }}
        run: bun run --filter "@randsum/$PKG" size

  workspace-scripts:
    # Guard against a package silently opting out of the standard script set.
    # `bun run --filter '*' <script>` skips packages that lack the target script,
    # which is how dice-ui escaped linting for months (audit Wave 3). This job
    # feeds the CI Gate so the escape hatch cannot be bypassed with --no-verify.
    name: workspace-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run check:workspace-scripts

  skill:
    name: claude-doctor
    needs: changes
    if: needs.changes.outputs.skill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - name: Verify skills
        run: npx skills-ref validate skills/dice-rolling/SKILL.md
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Verify plugin
        run: claude plugin validate .claude-plugin/plugin.json
      - name: Verify marketplace
        run: |
          if [ -f .claude-plugin/marketplace.json ]; then
            claude plugin validate .claude-plugin/marketplace.json
          else
            echo "No marketplace.json found, skipping"
          fi

  bench:
    name: bench (regression gate)
    needs: changes
    if: needs.changes.outputs.roller == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - name: Build roller
        run: bun run --filter '@randsum/roller' build
      - name: Run benchmark
        # bench:ci runs the suite 3x and emits the per-benchmark MEDIAN, so a
        # single cold/noisy run on a sub-20µs benchmark can no longer trip the
        # gate against a stale cached baseline (audit Wave 3 false positive).
        run: bun run bench:ci
      - name: Restore previous benchmark data
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-benchmark-
      - name: Compare and store benchmark
        uses: benchmark-action/github-action-benchmark@4de1bed97a47495fc4c5404952da0499e31f5c29 # v1.20.4
        with:
          tool: "customSmallerIsBetter"
          output-file-path: benchmark-results.json
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: true
          # Belt-and-braces with the median-of-3 runner above: 160% tolerance so
          # runner-to-runner variance on tiny benchmarks doesn't false-alarm,
          # while a genuine >1.6x regression still fails the gate.
          alert-threshold: "160%"
          comment-on-alert: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

  publish-dry-run:
    name: publish (dry run)
    needs: changes
    if: needs.changes.outputs.changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run build
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dry-run publish
        run: bun scripts/publish.ts --dry-run
      - name: Lint packaged tarballs (publint + attw)
        # Pack each publishable package and validate the tarball's manifest and
        # type-resolution profile. Pinned via bunx so no root deps are added.
        # These are ESM-only packages, so attw runs with --profile esm-only to
        # not fail on the expected missing-CJS resolutions.
        run: |
          set -euo pipefail
          for dir in packages/roller packages/games packages/mcp apps/cli; do
            echo "::group::$dir"
            ( cd "$dir" && bun pm pack )
            tgz=$(ls "$dir"/*.tgz)
            bunx publint@0.3.21 "$tgz"
            bunx @arethetypeswrong/cli@0.18.4 --profile esm-only "$tgz"
            rm -f "$dir"/*.tgz
            echo "::endgroup::"
          done

  knip:
    name: knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run knip

  arch:
    # Architecture invariants (audit X7b / architecture R2+R3): no circular deps,
    # no game-to-game import, no @randsum/*/src or /dist reach-in. Also runs in
    # lefthook pre-push; this CI copy cannot be bypassed with --no-verify.
    name: arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run arch:check

  audit:
    # Dependency advisory gate relocated from local-only pre-push into CI
    # (audit X8b / security F1, infrastructure F5). Cannot be bypassed with
    # --no-verify. The esbuild >=0.28.1 override in the root package.json
    # resolves GHSA-gv7w-rqvm-qjhr, so no --ignore is needed.
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun audit --audit-level=high

  sca:
    # SCA + license surfacing (audit X8a / security R2, F1, F2). Confirms the four
    # known dev/build-time advisories (ignored via osv-scanner.toml so this job
    # stays green) and surfaces LGPL/MPL transitives. Report-only: `bun audit`
    # above is the blocking advisory gate; this job is the confirmation/visibility
    # pass, so a new transient OSV finding informs without breaking the gate.
    name: sca
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Vulnerability scan (OSV). License surfacing was dropped — osv-scanner
      # v2's `--licenses` flag is an SPDX allowlist checker, not a summary mode
      # (`--licenses=summary` errors), and an allowlist would fail on the known
      # LGPL/MPL build-tool transitives. Revisit if a summary subcommand lands.
      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --recursive
            ./

  ci-gate:
    name: CI Gate
    if: always()
    # `package` is the consolidated matrix job: its single `result` aggregates
    # every leg (roller, games, cli, mcp, discord-bot, site, rdn, dice-ui) — if
    # any leg fails, the aggregate is `failure`, so listing it once still covers
    # all eight packages. `workspace-scripts` guards against a package silently
    # dropping a standard script.
    needs: [package, workspace-scripts, skill, bench, publish-dry-run, knip, arch, audit]
    runs-on: ubuntu-latest
    env:
      RESULTS: ${{ join(needs.*.result, ' ') }}
    steps:
      - name: Check results
        run: |
          for result in $RESULTS; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more checks failed or were cancelled"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"
