name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      roller: ${{ steps.filter.outputs.roller }}
      games: ${{ steps.filter.outputs.games }}
      cli: ${{ steps.filter.outputs.cli }}
      site: ${{ steps.filter.outputs.site }}
      skill: ${{ steps.filter.outputs.skill }}
      changesets: ${{ steps.filter.outputs.changesets }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            roller:
              - 'packages/roller/**'
              - '.github/workflows/ci.yml'
            games:
              - 'packages/roller/**'
              - 'packages/games/**'
              - '.github/workflows/ci.yml'
            cli:
              - 'packages/roller/**'
              - 'apps/cli/**'
              - '.github/workflows/ci.yml'
            site:
              - 'packages/**'
              - 'apps/site/**'
              - '.github/workflows/ci.yml'
            skill:
              - 'skills/**'
              - '.github/workflows/ci.yml'
            changesets:
              - '.changeset/**'
              - '!.changeset/README.md'
              - '!.changeset/config.json'

  roller:
    name: roller
    needs: changes
    if: needs.changes.outputs.roller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter '@randsum/roller' check
      - name: Check bundle size
        run: bun run --filter '@randsum/roller' size

  games:
    name: games
    needs: changes
    if: needs.changes.outputs.games == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/games' check
      - name: Verify generated files are up to date
        run: bun run --filter '@randsum/games' gen:check
      - name: Check bundle size
        run: bun run --filter '@randsum/games' size

  cli:
    name: cli
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/cli' check

  site:
    name: site
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run --filter '@randsum/site' check

  skill:
    name: skill-verify
    needs: changes
    if: needs.changes.outputs.skill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - run: npx skills-ref validate skills/dice-rolling/SKILL.md

  publish-dry-run:
    name: publish (dry run)
    needs: changes
    if: needs.changes.outputs.changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Dry-run publish
        run: bun scripts/publish.ts --dry-run
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ci-gate:
    name: CI Gate
    if: always()
    needs: [roller, games, cli, site, skill, publish-dry-run]
    runs-on: ubuntu-latest
    env:
      RESULTS: ${{ join(needs.*.result, ' ') }}
    steps:
      - name: Check results
        run: |
          for result in $RESULTS; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more checks failed or were cancelled"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"
