name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      roller: ${{ steps.filter.outputs.roller }}
      games: ${{ steps.filter.outputs.games }}
      cli: ${{ steps.filter.outputs.cli }}
      site: ${{ steps.filter.outputs.site }}
      rdn: ${{ steps.filter.outputs.rdn }}
      expo: ${{ steps.filter.outputs.expo }}
      skill: ${{ steps.filter.outputs.skill }}
      discord-bot: ${{ steps.filter.outputs.discord-bot }}
      changesets: ${{ steps.filter.outputs.changesets }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            roller:
              - 'packages/roller/**'
              - '.github/workflows/ci.yml'
            games:
              - 'packages/roller/**'
              - 'packages/games/**'
              - '.github/workflows/ci.yml'
            cli:
              - 'packages/roller/**'
              - 'apps/cli/**'
              - '.github/workflows/ci.yml'
            site:
              - 'packages/**'
              - 'apps/site/**'
              - '.github/workflows/ci.yml'
            rdn:
              - 'apps/rdn/**'
              - 'packages/roller/**'
              - '.github/workflows/ci.yml'
            expo:
              - 'apps/expo/**'
              - 'packages/roller/**'
              - 'packages/dice-ui/**'
              - '.github/workflows/ci.yml'
            skill:
              - 'skills/**'
              - '.claude-plugin/**'
              - '.github/workflows/ci.yml'
            discord-bot:
              - 'apps/discord-bot/**'
              - 'packages/roller/**'
              - 'packages/games/**'
              - '.github/workflows/ci.yml'
            changesets:
              - '.changeset/**'
              - '!.changeset/README.md'
              - '!.changeset/config.json'

  roller:
    name: roller
    needs: changes
    if: needs.changes.outputs.roller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run --filter '@randsum/roller' check
      - name: Generate coverage
        run: bun run --filter '@randsum/roller' test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574  # v5
        with:
          files: ./packages/roller/coverage/lcov.info
          flags: roller
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check bundle size
        run: bun run --filter '@randsum/roller' size

  games:
    name: games
    needs: changes
    if: needs.changes.outputs.games == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/games' check
      - name: Verify generated files are up to date
        run: bun run --filter '@randsum/games' gen:check
      - name: Generate coverage
        run: bun run --filter '@randsum/games' test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574  # v5
        with:
          files: ./packages/games/coverage/lcov.info
          flags: games
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check bundle size
        run: bun run --filter '@randsum/games' size

  cli:
    name: cli
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/cli' check

  discord-bot:
    name: discord-bot
    needs: changes
    if: needs.changes.outputs.discord-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run --filter '@randsum/roller' build && bun run --filter '@randsum/games' build
      - run: bun run --filter '@randsum/discord-bot' check

  site:
    name: site
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
        with:
          node-version: '22'
      - run: bun run build
      - run: bun run --filter '@randsum/site' check

  rdn:
    name: rdn
    needs: changes
    if: needs.changes.outputs.rdn == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
        with:
          node-version: '22'
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/rdn' check

  expo:
    name: expo
    needs: changes
    if: needs.changes.outputs.expo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run --filter '@randsum/roller' build
      - run: bun run --filter '@randsum/expo' typecheck
      - run: bun run --filter '@randsum/expo' lint
      - name: Test IndexScreen layout
        run: bun test apps/expo/__tests__/IndexScreen.test.tsx

  skill:
    name: claude-doctor
    needs: changes
    if: needs.changes.outputs.skill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - name: Verify skills
        run: npx skills-ref validate skills/dice-rolling/SKILL.md
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Verify plugin
        run: claude plugin validate .claude-plugin/plugin.json
      - name: Verify marketplace
        run: |
          if [ -f .claude-plugin/marketplace.json ]; then
            claude plugin validate .claude-plugin/marketplace.json
          else
            echo "No marketplace.json found, skipping"
          fi

  bench:
    name: bench (regression gate)
    needs: changes
    if: needs.changes.outputs.roller == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - name: Build roller
        run: bun run --filter '@randsum/roller' build
      - name: Run benchmark
        run: bun run bench:ci
      - name: Restore previous benchmark data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-benchmark-
      - name: Compare and store benchmark
        uses: benchmark-action/github-action-benchmark@4de1bed97a47495fc4c5404952da0499e31f5c29  # v1.20.4
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: true
          alert-threshold: '150%'
          comment-on-alert: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

  publish-dry-run:
    name: publish (dry run)
    needs: changes
    if: needs.changes.outputs.changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run build
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dry-run publish
        run: bun scripts/publish.ts --dry-run

  knip:
    name: knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/bun-setup
      - run: bun run knip

  ci-gate:
    name: CI Gate
    if: always()
    needs: [roller, games, cli, discord-bot, site, rdn, expo, skill, bench, publish-dry-run, knip]
    runs-on: ubuntu-latest
    env:
      RESULTS: ${{ join(needs.*.result, ' ') }}
    steps:
      - name: Check results
        run: |
          for result in $RESULTS; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more checks failed or were cancelled"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"
