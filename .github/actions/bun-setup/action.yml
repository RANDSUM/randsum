name: Setup Bun
description: Read .bun-version, setup bun, restore cache, and install dependencies
inputs:
  node-version:
    description: 'Node version to setup via actions/setup-node (omit to skip node setup)'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL for setup-node (e.g. https://registry.npmjs.org)'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Read Bun version
      id: bun-version
      shell: bash
      run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      with:
        bun-version: ${{ steps.bun-version.outputs.version }}
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
      if: ${{ inputs.node-version != '' }}
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url || '' }}
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-
    - run: bun install --frozen-lockfile
      shell: bash
