[build]
  # Build command runs from root (base directory). The site imports @randsum/roller
  # and @randsum/games (via subpath exports, so both must be built first); it does
  # NOT import @randsum/cli or @randsum/discord-bot (those appear only in MDX prose).
  # So build just roller + games rather than the full `bun run build`, conserving
  # free-tier build minutes. roller is built before games because games depends on it.
  command = "bun run --filter '@randsum/roller' build && bun run --filter '@randsum/games' build && bun run site:build"
  publish = "apps/site/dist"
  # Skip the build (exit 0) when no changes touched this site or its build inputs,
  # conserving free-tier build minutes. The site imports roller + games and renders
  # MDX docs for the whole ecosystem, so it rebuilds on changes to apps/site, any
  # packages/*, or root build config (lockfile, workspace + tsconfig). It does NOT
  # rebuild for changes confined to the other apps (rdn, cli, discord-bot).
  # `git diff --quiet` exits 1 when the listed paths changed → build proceeds. On the
  # first build CACHED_COMMIT_REF is empty and git errors non-zero, so the build also
  # proceeds (safe default).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/site packages package.json bun.lock tsconfig.json tsconfig.packages.json"

# Serve the hosted games meta-schema with an explicit JSON content type. The
# schema is reachable at its declared $id (https://randsum.dev/schemas/v1/randsum.json)
# and editors fetch it via a `$schema` reference, so the content type must be
# application/json (Netlify's default for .json, pinned here to be explicit).
[[headers]]
  for = "/schemas/*"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[build.environment]
  # Pin the build toolchain so Netlify deploys are reproducible (audit X4 /
  # infrastructure F1). NODE_VERSION matches the CI site job (node 22); BUN_VERSION
  # matches .bun-version (1.3.14). Netlify also auto-detects .bun-version, but
  # declaring it here keeps the version visible in the deploy config.
  NODE_VERSION = "22"
  BUN_VERSION = "1.3.14"

[dev]
  command = "astro dev"
  targetPort = 4321
  port = 8888

# The 11 legacy 301 redirects (old /packages/*, /docs/*, /getting-started/* URLs)
# now live in apps/site/astro.config.mjs under `redirects: {...}` — NOT here.
# Reason: this site ships an on-demand SSR function (src/pages/api/roll.ts), and
# @astrojs/netlify registers it at `/*` with preferStatic: true. Netlify runs
# functions BEFORE toml [[redirects]] and preferStatic only defers to existing
# static files, so toml redirects for those (static-file-less) sources would be
# shadowed by the function and 404 instead of 301. Astro emits the config
# redirects as routes the function serves itself, bypassing that precedence.
# Keep new legacy redirects in astro.config.mjs so the two configs never drift.

# Redirect 404s to the 404 page. Kept here as a static-file-level catch-all — it
# is a status-404 rewrite, not a 301, so it does not belong in Astro's redirects.
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
