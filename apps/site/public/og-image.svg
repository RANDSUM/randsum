<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="logo-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="#6366f1"/>

  <!-- Left accent line -->
  <rect x="80" y="80" width="4" height="470" fill="#6366f1" rx="2"/>

  <!-- Logo -->
  <image href="/randsum-logo.png" xlink:href="/randsum-logo.png" x="120" y="80" width="120" height="120" filter="url(#logo-shadow)"/>

  <!-- RANDSUM title (gradient matching hero component) -->
  <text x="262" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="84" font-weight="700" fill="url(#title-gradient)" letter-spacing="-2">RANDSUM</text>

  <!-- Tagline -->
  <text x="120" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#e2e8f0">TypeScript-First Dice Notation Ecosystem</text>

  <!-- Subline -->
  <text x="120" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#818cf8" font-style="italic">Throw Dice, Not Exceptions.</text>

  <!-- Code block background -->
  <rect x="120" y="318" width="960" height="140" rx="8" fill="#1e293b"/>
  <rect x="120" y="318" width="960" height="140" rx="8" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- import { roll } from '@randsum/roller' -->
  <text x="155" y="364" font-family="monospace, 'Courier New'" font-size="21" fill="#818cf8">import</text>
  <text x="232" y="364" font-family="monospace, 'Courier New'" font-size="21" fill="#e2e8f0">{ roll }</text>
  <text x="323" y="364" font-family="monospace, 'Courier New'" font-size="21" fill="#818cf8">from</text>
  <text x="380" y="364" font-family="monospace, 'Courier New'" font-size="21" fill="#67e8f9">'@randsum/roller'</text>

  <!-- roll('4d6L') -->
  <text x="155" y="402" font-family="monospace, 'Courier New'" font-size="21" fill="#a5b4fc">roll</text>
  <text x="195" y="402" font-family="monospace, 'Courier New'" font-size="21" fill="#e2e8f0">(</text>
  <text x="207" y="402" font-family="monospace, 'Courier New'" font-size="21" fill="#67e8f9">'4d6L'</text>
  <text x="281" y="402" font-family="monospace, 'Courier New'" font-size="21" fill="#e2e8f0">)</text>
  <text x="304" y="402" font-family="monospace, 'Courier New'" font-size="21" fill="#475569">// D&amp;D ability score (drop lowest)</text>

  <!-- roll('2d20H') -->
  <text x="155" y="440" font-family="monospace, 'Courier New'" font-size="21" fill="#a5b4fc">roll</text>
  <text x="195" y="440" font-family="monospace, 'Courier New'" font-size="21" fill="#e2e8f0">(</text>
  <text x="207" y="440" font-family="monospace, 'Courier New'" font-size="21" fill="#67e8f9">'2d20H'</text>
  <text x="294" y="440" font-family="monospace, 'Courier New'" font-size="21" fill="#e2e8f0">)</text>
  <text x="317" y="440" font-family="monospace, 'Courier New'" font-size="21" fill="#475569">// advantage</text>

  <!-- Install badges: npm, bun, yarn -->
  <rect x="120" y="478" width="318" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="144" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#94a3b8">npm install </text>
  <text x="280" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#67e8f9">@randsum/roller</text>

  <rect x="454" y="478" width="278" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="478" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#94a3b8">bun add </text>
  <text x="566" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#67e8f9">@randsum/roller</text>

  <rect x="748" y="478" width="282" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="772" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#94a3b8">yarn add </text>
  <text x="866" y="506" font-family="monospace, 'Courier New'" font-size="17" fill="#67e8f9">@randsum/roller</text>

  <!-- Bottom: website URL -->
  <text x="120" y="592" font-family="system-ui, sans-serif" font-size="22" fill="#475569">randsum.dev</text>
</svg>
